<section class="auth">
  <form class="tarjeta-auth" (ngSubmit)="enviar()">
    <h1>Crear cuenta</h1>

    <label>
      Nombre
      <input type="text" name="nombre" [(ngModel)]="nombre" required autocomplete="name" />
    </label>

    <label>
      Email
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </label>

    <label>
      Teléfono (opcional)
      <input type="tel" name="telefono" [(ngModel)]="telefono" autocomplete="tel" />
    </label>

    <label>
      Contraseña
      <input type="password" name="password" [(ngModel)]="password" required minlength="6"
             autocomplete="new-password" />
    </label>

    @if (error()) {
      <p class="mensaje-error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="cargando()">
      {{ cargando() ? 'Creando cuenta…' : 'Crear cuenta' }}
    </button>

    <p class="enlace-secundario">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </form>
</section>
